[package]
name = "rpv-ground"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio         = { version = "1", features = ["net", "sync", "rt-multi-thread", "time", "signal"] }
egui          = "0.29"
eframe        = { version = "0.29", default-features = false, features = ["wgpu", "default_fonts", "wayland", "x11", "accesskit"] }
egui-wgpu     = "0.29"
wgpu          = "22"

serde         = { version = "1", features = ["derive"] }
serde_json    = "1"
tracing       = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
toml          = "0.8"
ctrlc         = "3"
reed-solomon-erasure = "6"
libc          = "0.2"
crossbeam-channel = "0.5"
num_cpus = "1"
